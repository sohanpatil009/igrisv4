<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="256" height="256" fill="#000000"/>
  
  <!-- Outer glow circles -->
  <circle cx="128" cy="128" r="120" fill="none" stroke="#06b6d4" stroke-width="2" opacity="0.3"/>
  <circle cx="128" cy="128" r="100" fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.4"/>
  <circle cx="128" cy="128" r="80" fill="none" stroke="#06b6d4" stroke-width="2" opacity="0.5"/>
  
  <!-- Core gradient circle -->
  <defs>
    <radialGradient id="coreGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.8" />
    </radialGradient>
    
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Core circle with glow -->
  <circle cx="128" cy="128" r="40" fill="url(#coreGradient)" filter="url(#glow)"/>
  
  <!-- Center bright spot -->
  <circle cx="128" cy="128" r="20" fill="#cffafe" opacity="0.9"/>
  
  <!-- Accent dots -->
  <circle cx="128" cy="60" r="6" fill="#06b6d4" opacity="0.8"/>
  <circle cx="196" cy="128" r="6" fill="#3b82f6" opacity="0.8"/>
  <circle cx="128" cy="196" r="6" fill="#06b6d4" opacity="0.8"/>
  <circle cx="60" cy="128" r="6" fill="#3b82f6" opacity="0.8"/>
  
  <!-- Text "IGRIS" -->
  <text x="128" y="220" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#06b6d4" letter-spacing="2">IGRIS</text>
</svg>